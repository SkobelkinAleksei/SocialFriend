server:
  port: 8082

spring:
  application:
    name: friend
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:postgresql://localhost:5432/social_friend_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  logging:
    level:
      org.springframework.cloud.gateway: DEBUG             # ??????????? ??? Spring Cloud Gateway
      reactor.netty.http.client: DEBUG                      # ??????????? ??? ??????????? HTTP ???????
      org.springframework.web: DEBUG                        # ??????????? ??? Spring Web
      org.hibernate.SQL: DEBUG                               # ??????????? SQL-???????? Hibernate
      org.springframework.orm.jpa: DEBUG                    # ??????????? ???????? JPA